<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FP Masterclass: Senior Architect Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        body {
            background-color: #fafaf9;
            color: #1c1917;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            height: 200px;
        }

        .glass-panel {
            background: white;
            border: 1px solid #e7e5e4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .diff-btn-active {
            background-color: #ea580c;
            color: white;
            box-shadow: 0 2px 4px rgba(234, 88, 12, 0.2);
        }

        .diff-btn-inactive {
            background-color: #f5f5f4;
            color: #78716c;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            border-radius: 0 !important;
            font-size: 0.85rem !important;
            background: transparent !important;
        }

        .qna-text {
            font-size: clamp(8rem, 20vw, 15rem);
            line-height: 1;
            letter-spacing: -0.05em;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col pb-32 relative">

    <!-- Q&A FULL SCREEN OVERLAY -->
    <div id="qna-overlay"
        class="fixed inset-0 flex flex-col items-center justify-center p-8 bg-[#0c0a09] z-[1000] hidden">
        <button onclick="toggleQnA()"
            class="absolute top-8 right-8 text-stone-500 hover:text-stone-300 font-mono text-sm tracking-widest uppercase flex items-center gap-2 transition-colors">
            <span>✕</span> Close
        </button>
        <div class="flex flex-col items-center justify-center animate-pulse">
            <h1 class="qna-text font-black text-orange-600 text-center tracking-tighter">Q&A</h1>
            <div class="h-2 w-32 bg-stone-800 rounded-full mt-4"></div>
        </div>
        <footer class="absolute bottom-12 left-0 w-full text-center">
            <p class="text-stone-500 font-mono text-sm tracking-widest uppercase">The floor is now open for your
                questions</p>
        </footer>
    </div>

    <!-- FLOATING Q&A BUTTON -->
    <button onclick="toggleQnA()"
        class="fixed top-6 right-6 z-50 text-xs font-bold uppercase tracking-widest text-stone-600 hover:text-orange-600 transition-colors bg-white/80 backdrop-blur-md px-5 py-2.5 rounded-full border border-stone-200 shadow-sm flex items-center gap-2">
        <span>🎙️</span> Q&A Mode
    </button>

    <main class="flex-1 w-full p-6 md:p-12 transition-all duration-300">
        <div class="max-w-5xl mx-auto" id="main-content"></div>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-lg border-t border-stone-200 z-50 p-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <button id="btn-prev" onclick="goPrev()"
                class="px-6 py-2 rounded-xl text-sm font-bold bg-stone-100 text-stone-600 hover:bg-stone-200 disabled:opacity-30 transition-all">←
                Prev</button>
            <div id="slide-indicator" class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400"></div>
            <button id="btn-next" onclick="goNext()"
                class="px-6 py-2 rounded-xl text-sm font-bold bg-orange-600 text-white hover:bg-orange-700 disabled:opacity-30 transition-all">Next
                →</button>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
        const masterclassData = {
            intro: {
                title: "Functional Programming Mastery",
                subtitle: "Writing 'Pro-Level' Interview Code",
                about: "In an industry obsessed with how-to, the most successful engineers are those who ask why. Dismantle the spaghetti habits of imperative programming and rebuild your mental model using the principles of functional purity. Bridge the gap between homework code and senior-level architecture by mastering code that is as elegant as it is robust."
            },
            topics: [
                {
                    id: 1, title: "Pure Functions and Side Effects", focus: "Isolate state to prevent unpredictable bugs.",
                    desc: "Functions that always produce the same output for the same input and do not modify any state outside their own scope, ensuring data consistency and isolation.",
                    proPoint: "When asked about pure functions, don't just say 'no side effects'. Tell the interviewer you use them to make your business logic predictable and trivial to unit-test without mocking external states.",
                    challenges: {
                        easy: { desc: "Simple addition logic.", jr: "let total = 0;\nfunction add(n) {\n  total += n;\n  return total;\n}", sr: "const add = (a, b) => a + b;" },
                        medium: { desc: "Applying student discounts.", jr: "let disc = 0.1;\nfunction apply(price) { return price * (1 - disc); }", sr: "const apply = (price, disc) => price * (1 - disc);" },
                        hard: { desc: "Complex user profile update.", jr: "function update(user, marks) {\n  user.marks = marks;\n  user.updatedAt = Date.now();\n  saveToDb(user);\n}", sr: "const update = (user, marks) => ({\n  ...user,\n  marks,\n  updatedAt: Date.now()\n});" }
                    },
                    metrics: { easy: [40, 10], medium: [70, 15], hard: [95, 20] }
                },
                {
                    id: 2, title: "Declarative vs Imperative Programming", focus: "Tell the computer what you want, not how to get it.",
                    desc: "A paradigm shift from micro-managing control flow (how to do it) to defining abstractions and desired results (what to do).",
                    proPoint: "In an interview, mention that declarative array methods (like map/filter/reduce) drastically reduce cognitive load for whoever reads your code next, making the codebase much easier to maintain.",
                    challenges: {
                        easy: { desc: "Filtering numbers.", jr: "let res = [];\nfor(let i=0; i<arr.length; i++){\n  if(arr[i]>5) res.push(arr[i]);\n}", sr: "const res = arr.filter(x => x > 5);" },
                        medium: { desc: "Extracting names from objects.", jr: "let names = [];\nfor(let s of students) {\n  names.push(s.name);\n}", sr: "const names = students.map(s => s.name);" },
                        hard: { desc: "Calculating average of passing marks.", jr: "let sum = 0, count = 0;\nfor(let m of marks) {\n  if(m >= 40) { sum += m; count++; }\n}\nconst avg = sum / count;", sr: "const passing = marks.filter(m => m >= 40);\nconst avg = passing.reduce((s, m) => s + m, 0) / passing.length;" }
                    },
                    metrics: { easy: [45, 12], medium: [65, 18], hard: [90, 22] }
                },
                {
                    id: 3, title: "Closures and Currying", focus: "Functions that remember their birthplace.",
                    desc: "Utilizing lexical scoping to remember variables from an original scope and using partial application to break complex functions into simpler, single-argument chains.",
                    proPoint: "Explain closures as the mechanism for creating private variables in JavaScript. Mention currying as a way to build 'Function Factories'—a great architectural buzzword to drop during a system design round.",
                    challenges: {
                        easy: { desc: "Counter factory.", jr: "let c = 0;\nfunction inc() { return ++c; }", sr: "const createCounter = () => {\n  let c = 0;\n  return () => ++c;\n};" },
                        medium: { desc: "Custom loggers.", jr: "function log(type, msg) {\n  console.log(`[${type}] ${msg}`);\n}", sr: "const logger = type => msg => console.log(`[${type}] ${msg}`);" },
                        hard: { desc: "Deeply configured API client.", jr: "function req(url, auth, data) {\n  return fetch(url, { headers: { Auth: auth }, body: data });\n}", sr: "const api = url => auth => data => fetch(url, { headers: { auth }, body: data });" }
                    },
                    metrics: { easy: [50, 15], medium: [75, 20], hard: [98, 28] }
                },
                {
                    id: 4, title: "Function Composition", focus: "Chain simple functions to build complex logic.",
                    desc: "Building modular data pipelines by connecting single-purpose functions in a linear sequence, avoiding deeply nested function calls.",
                    proPoint: "Compare nested function calls (the 'Pyramid of Doom') to functional pipelines. Tell the interviewer that pipelines create a unidirectional data flow that is incredibly easy to debug step-by-step.",
                    challenges: {
                        easy: { desc: "Double and Increment.", jr: "const res = inc(double(5));", sr: "const pipe = (f, g) => x => g(f(x));\nconst res = pipe(double, inc)(5);" },
                        medium: { desc: "Clean and UpperCase.", jr: "const res = \" hello \".trim().toUpperCase();", sr: "const process = pipe(trim, upperCase);\nconst res = process(\" hello \");" },
                        hard: { desc: "Advanced data transformation.", jr: "const res = exclaim(capitalize(slugify(title)));", sr: "const flow = (...fns) => x => fns.reduce((v, f) => f(v), x);\nconst prepare = flow(slugify, capitalize, exclaim);\nconst res = prepare(title);" }
                    },
                    metrics: { easy: [55, 15], medium: [80, 20], hard: [100, 25] }
                },
                {
                    id: 5, title: "Immutability", focus: "Never overwrite data; always create a fresh copy.",
                    desc: "The practice of never modifying existing data structures, instead creating fresh copies for updates to ensure predictable state management and easier debugging.",
                    proPoint: "Always tie immutability back to modern UI frameworks. Tell the interviewer that immutable state makes change detection (like in React) lightning fast because the engine only needs to check memory references.",
                    challenges: {
                        easy: { desc: "Update age.", jr: "user.age = 21;", sr: "const updated = { ...user, age: 21 };" },
                        medium: { desc: "Add item to array.", jr: "list.push('new');", sr: "const next = [...list, 'new'];" },
                        hard: { desc: "Update nested student marks.", jr: "student.scores.math = 95;\nstudent.updatedAt = now();", sr: "const updated = {\n  ...student,\n  scores: { ...student.scores, math: 95 },\n  updatedAt: now()\n};" }
                    },
                    metrics: { easy: [40, 10], medium: [70, 25], hard: [95, 35] }
                },
                {
                    id: 6, title: "Coding Best Practices for Interviews", focus: "Write code that communicates your seniority.",
                    desc: "Employing architectural signaling and system-design thinking to demonstrate senior-level logic during technical screenings.",
                    proPoint: "Start your whiteboard solution by explicitly stating: 'I'll use an immutable, declarative approach to prevent race conditions.' This instantly elevates you from a junior coder to an architectural thinker.",
                    challenges: {
                        easy: { desc: "Variable declaration.", jr: "var count = 0;", sr: "const count = 0;" },
                        medium: { desc: "Function declaration.", jr: "function doSomething() { }", sr: "const doSomething = () => { };" },
                        hard: { desc: "Starting a new feature.", jr: "let res = []; // Manual Loop", sr: "const transform = (data) => data.map(...);" }
                    },
                    metrics: { easy: [30, 5], medium: [50, 10], hard: [85, 15] }
                }
            ]
        };

        const pageOrder = ['intro', 1, 2, 3, 4, 5, 6];
        let currentIndex = 0;
        let currentDifficulty = 'easy';
        let currentViewMode = 'junior'; // Default to junior view
        let metricsChartInstance = null;

        function toggleQnA() {
            const overlay = document.getElementById('qna-overlay');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
            } else {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }

        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                currentViewMode = 'junior'; // Reset on slide switch
                renderCurrentPage();
            }
        }
        function goNext() {
            if (currentIndex < pageOrder.length - 1) {
                currentIndex++;
                currentViewMode = 'junior'; // Reset on slide switch
                renderCurrentPage();
            }
        }

        function renderCurrentPage() {
            const pageId = pageOrder[currentIndex];
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            if (pageId === 'intro') {
                renderIntro(container);
            } else {
                renderTopic(container, pageId);
            }

            updateFooter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateFooter() {
            const pageId = pageOrder[currentIndex];
            document.getElementById('btn-prev').disabled = currentIndex === 0;
            document.getElementById('btn-next').disabled = currentIndex === pageOrder.length - 1;
            let label = pageId === 'intro' ? 'Home' : `Topic 0${pageId}`;
            document.getElementById('slide-indicator').innerText = `${label} • ${currentIndex + 1} / ${pageOrder.length}`;
        }

        function renderIntro(container) {
            container.innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
            <h1 class="text-4xl md:text-6xl font-black text-stone-900 mb-2">${masterclassData.intro.title}</h1>
            <p class="text-xl font-bold text-orange-600 mb-12">${masterclassData.intro.subtitle}</p>
            <div class="max-w-2xl bg-white p-8 rounded-3xl border border-stone-200 shadow-sm">
                <p class="text-stone-600 leading-relaxed text-lg">${masterclassData.intro.about}</p>
            </div>
            <button onclick="goNext()" class="mt-12 bg-stone-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-black transition-all">Begin Session</button>
        </div>
    `;
        }

        function renderTopic(container, id) {
            const t = masterclassData.topics.find(x => x.id === id);
            container.innerHTML = `
        <header class="mb-8">
            <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Topic 0${t.id}</span>
            <h2 class="text-3xl md:text-5xl font-black text-stone-900 mt-4">${t.title}</h2>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-10">
            <!-- LEFT COLUMN -->
            <div class="lg:col-span-7 flex flex-col justify-center space-y-6">
                <h3 class="text-xl font-bold text-orange-600">${t.focus}</h3>
                <p class="text-stone-600 text-lg leading-relaxed">${t.desc}</p>
                <div class="bg-orange-50 border-l-4 border-orange-500 p-5 rounded-r-xl">
                    <h4 class="text-[10px] font-black uppercase text-orange-800 tracking-[0.2em] mb-2 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1a1 1 0 112 0v1a1 1 0 11-2 0zM13.657 15.657a1 1 0 001.414-1.414l-.707-.707a1 1 0 10-1.414 1.414l.707.707zM16.464 14.95a1 1 0 10-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707z"></path></svg>
                        Pro Tip
                    </h4>
                    <p class="text-sm text-stone-700 italic">${t.proPoint}</p>
                </div>
            </div>
            
            <!-- RIGHT COLUMN: Cognitive Load -->
            <div class="lg:col-span-5">
                <div class="glass-panel p-6 rounded-3xl h-full flex flex-col justify-center">
                    <h3 class="text-xs font-bold text-stone-400 uppercase tracking-widest mb-4 text-center">Cognitive Load</h3>
                    <div class="chart-container flex-1 min-h-[200px]">
                        <canvas id="metricsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- CODE DIFF -->
        <div class="space-y-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div class="flex gap-1 bg-stone-100 p-1 rounded-xl">
                    <button onclick="setViewMode('junior')" id="view-junior" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${currentViewMode === 'junior' ? 'diff-btn-active' : 'diff-btn-inactive'}">Junior</button>
                    <button onclick="setViewMode('senior')" id="view-senior" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${currentViewMode === 'senior' ? 'diff-btn-active' : 'diff-btn-inactive'}">Senior</button>
                    <button onclick="setViewMode('compare')" id="view-compare" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${currentViewMode === 'compare' ? 'diff-btn-active' : 'diff-btn-inactive'}">Compare</button>
                </div>
                <div class="flex gap-1 bg-stone-100 p-1 rounded-xl">
                    ${['easy', 'medium', 'hard'].map(l => `<button onclick="setDifficulty('${l}')" id="diff-${l}" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${currentDifficulty === l ? 'diff-btn-active' : 'diff-btn-inactive'}">${l}</button>`).join('')}
                </div>
            </div>
            
            <div id="challenge-desc" class="text-sm font-medium text-stone-600 bg-white p-3 rounded-xl border border-stone-200 shadow-sm border-l-4 border-l-orange-500"></div>

            <div class="flex flex-col md:flex-row gap-4 w-full">
                <div id="jr-wrapper" class="flex-1 min-w-0 bg-[#1e1e1e] rounded-2xl overflow-hidden shadow-xl border border-stone-800 ${currentViewMode === 'senior' ? 'hidden' : ''}">
                    <div class="bg-stone-800/50 px-6 py-2 flex justify-between items-center border-b border-stone-700">
                        <span class="text-red-400 text-[10px] font-black uppercase tracking-widest">Junior Trap</span>
                    </div>
                    <div class="p-6 overflow-x-auto"><pre><code id="jr-code" class="language-javascript"></code></pre></div>
                </div>
                <div id="sr-wrapper" class="flex-1 min-w-0 bg-[#252525] rounded-2xl overflow-hidden shadow-xl border border-stone-800 ${currentViewMode === 'junior' ? 'hidden' : ''}">
                    <div class="bg-stone-800/50 px-6 py-2 flex justify-between items-center border-b border-stone-700">
                        <span class="text-green-400 text-[10px] font-black uppercase tracking-widest">Senior Fix</span>
                    </div>
                    <div class="p-6 overflow-x-auto"><pre><code id="sr-code" class="language-javascript"></code></pre></div>
                </div>
            </div>
        </div>
    `;
            updateCode(t);
            initChart(t.metrics[currentDifficulty]);
        }

        function setDifficulty(l) {
            currentDifficulty = l;

            // Update button styles without re-rendering the whole page
            ['easy', 'medium', 'hard'].forEach(diff => {
                const btn = document.getElementById(`diff-${diff}`);
                if (btn) {
                    btn.className = `px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${diff === l ? 'diff-btn-active' : 'diff-btn-inactive'}`;
                }
            });

            // Update only the code and chart
            if (pageOrder[currentIndex] !== 'intro') {
                const t = masterclassData.topics.find(x => x.id === pageOrder[currentIndex]);
                if (t) {
                    updateCode(t);
                    initChart(t.metrics[currentDifficulty]);
                }
            }
        }

        function setViewMode(mode) {
            currentViewMode = mode;
            ['junior', 'senior', 'compare'].forEach(m => {
                const btn = document.getElementById(`view-${m}`);
                if (btn) {
                    btn.className = `px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${m === mode ? 'diff-btn-active' : 'diff-btn-inactive'}`;
                }
            });

            const jr = document.getElementById('jr-wrapper');
            const sr = document.getElementById('sr-wrapper');

            if (jr && sr) {
                if (mode === 'junior') {
                    jr.classList.remove('hidden');
                    sr.classList.add('hidden');
                } else if (mode === 'senior') {
                    jr.classList.add('hidden');
                    sr.classList.remove('hidden');
                } else {
                    jr.classList.remove('hidden');
                    sr.classList.remove('hidden');
                }
            }
        }

        function updateCode(t) {
            const jr = document.getElementById('jr-code');
            const sr = document.getElementById('sr-code');
            const desc = document.getElementById('challenge-desc');

            if (desc) {
                desc.innerHTML = `<span class="font-black text-stone-900 uppercase tracking-widest text-[10px] mr-2">Scenario:</span> ${t.challenges[currentDifficulty].desc}`;
            }

            jr.textContent = t.challenges[currentDifficulty].jr;
            sr.textContent = t.challenges[currentDifficulty].sr;
            Prism.highlightElement(jr);
            Prism.highlightElement(sr);
        }

        function initChart(data) {
            const ctx = document.getElementById('metricsChart').getContext('2d');
            if (metricsChartInstance) metricsChartInstance.destroy();
            metricsChartInstance = new Chart(ctx, {
                type: 'bar', data: { labels: ['Jr', 'Sr'], datasets: [{ data: data, backgroundColor: ['#f87171', '#4ade80'], borderRadius: 4, barThickness: 60 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100, display: false }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        window.onload = () => { renderCurrentPage(); };
    </script>
</body>

</html>
